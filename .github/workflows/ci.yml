name: prachi cloudKart CI Pipeline

on:
  push:
    branches:
      - main
jobs:
  frontend-build:
    runs-on: ubuntu-latest
    

    steps:
      - name: code-checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Build React App
        working-directory: ./Frontend
        run: npm run build


  backend-build:
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: code-checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./Backend
        run: npm install

      - name: Build React App
        working-directory: ./Backend
        run: npm run build
