name: prachi cloudKart CI Pipeline

on:
  push:
    branches:
      - main
jobs:
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: code-checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm install
      - name: Build npm
        run: npm build