name: prachi cloudKart CI Pipeline

on:
  push:
    branches:
      - main
jobs:
  frontend-build:
    runs-on: ubuntu-latest
    

    steps:
      - name: code-checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Build React App
        working-directory: ./Frontend
        run: npm run build

  backend-build:
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: code-checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./Backend
        run: npm install

      - name: Backend Validation
        run: echo "Backend Build Successful"

  database-build:

    runs-on: ubuntu-latest
    needs: backend-build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build PostgreSQL Docker Image
        run: docker build -t prachi-postgres ./Database

      - name: Database Validation
        run: echo "PostgreSQL Database Image Built Successfully"

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-build,backend-build,database-build]

    steps:
      - name: code-checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Buil-frontend-Image
        working-directory: ./Frontend
        run: docker image build -t frontend:1.0 .

      - name: Tagging and Pusing into DockerHub
        run : |
              docker image tag frontend:1.0 ${{ vars.DOCKER_USERNAME }}/frontend:latest
              docker push ${{ vars.DOCKER_USERNAME }}/frontend:latest


      
